name: Scan LinkedIn Jobs

on:
  schedule:
    # Weekdays: every 30 min during 9 AM – 9 PM EST (13:00–01:00 UTC)
    - cron: '0,30 13-23 * * 1-5'
    - cron: '0,30 0 * * 2-6'
    # Weekdays: every 60 min during 9 PM – 9 AM EST (01:00–12:00 UTC)
    - cron: '0 1-12 * * 2-6'
    # Weekends: every 4 hours
    - cron: '0 */4 * * 0,6'
  workflow_dispatch: # Allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install JobFlow
        run: pip install -e .

      - name: Run LinkedIn scan
        env:
          JOBFLOW_CONFIG: config/config.ci.yaml
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Starting scan at $(date -u)"
          jobflow scan --platform linkedin --new --save --hours 1 2>&1 || true
          echo "Scan finished at $(date -u)"

      - name: Merge into linkedin_jobs.json
        env:
          JOBFLOW_CONFIG: config/config.ci.yaml
        run: |
          python -c "
          from pathlib import Path
          from jobflow.linkedin_store import load_store, save_store, merge_scan_results, prune_old_jobs, backfill_job
          import json

          root = Path('.')
          store_path = root / 'data' / 'ci' / 'linkedin_jobs.json'
          scan_path = root / 'data' / 'ci' / 'scan_results.json'

          if not scan_path.exists():
              print('No scan_results.json found, skipping merge')
              exit(0)

          scan_data = json.loads(scan_path.read_text())
          store = load_store(store_path)
          store = merge_scan_results(store, scan_data)
          store = prune_old_jobs(store)
          for key in store.get('jobs', {}):
              store['jobs'][key] = backfill_job(store['jobs'][key])
          save_store(store_path, store)
          print(f'Merged: {len(store.get(\"jobs\", {}))} total jobs in store')
          "

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ci/
          if git diff --cached --quiet; then
            echo "No new jobs found"
          else
            COUNT=$(python -c "import json; d=json.load(open('data/ci/linkedin_jobs.json')); print(len(d.get('jobs', d)))" 2>/dev/null || echo "?")
            git commit -m "scan: LinkedIn $(date -u +%Y-%m-%dT%H:%M) — ${COUNT} jobs total"
            git pull --rebase origin main
            git push
          fi
