name: Scan LinkedIn Jobs

on:
  # Times below are in UTC. User timezone: US/Eastern (EDT = UTC-4).
  # Intent:
  #   Weekdays 8AM-8PM EDT → hourly
  #   Weekday nights (9PM-7AM EDT) → every 2 hours
  #   Weekends → every 2 hours, all day
  schedule:
    # Mon-Fri 8AM-7PM EDT  (12:00-23:00 UTC) — hourly
    - cron: '0 12-23 * * 1-5'
    # Mon-Fri 8PM EDT      (00:00 UTC Tue-Sat) — last peak slot
    - cron: '0 0 * * 2-6'
    # Mon-Fri 9PM-7AM EDT  (01:00-11:00 UTC Tue-Sat) — every 2h
    - cron: '0 1-11/2 * * 2-6'
    # Saturday + Sunday    — every 2h, all day
    - cron: '0 */2 * * 0,6'
    # Sun 8PM EDT → Mon 7AM EDT (00:00-10:00 UTC Mon) — every 2h bridge
    - cron: '0 0-10/2 * * 1'
  workflow_dispatch: # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install JobFlow
        run: pip install -e .

      - name: Run LinkedIn scan
        env:
          JOBFLOW_CONFIG: config/config.ci.yaml
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Starting scan at $(date -u)"
          jobflow scan --platform linkedin --new --save --hours 4 2>&1 || true
          echo "Scan finished at $(date -u)"

      - name: Merge into database
        if: ${{ env.DATABASE_URL != '' }}
        env:
          JOBFLOW_CONFIG: config/config.ci.yaml
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -c "
          from pathlib import Path
          from jobflow.db import init_db, merge_scan_results, prune_expired_jobs
          import json

          init_db()
          scan_path = Path('data/ci/scan_results.json')
          if not scan_path.exists():
              print('No scan_results.json found, skipping merge')
              exit(0)

          scan_data = json.loads(scan_path.read_text())
          new_count = merge_scan_results(scan_data)
          pruned = prune_expired_jobs()
          print(f'Merged: {new_count} new jobs, pruned {pruned} expired')
          "

      - name: Merge into linkedin_jobs.json (fallback)
        if: ${{ env.DATABASE_URL == '' }}
        env:
          JOBFLOW_CONFIG: config/config.ci.yaml
        run: |
          python -c "
          from pathlib import Path
          from jobflow.linkedin_store import load_store, save_store, merge_scan_results, prune_old_jobs, backfill_job
          import json

          root = Path('.')
          store_path = root / 'data' / 'ci' / 'linkedin_jobs.json'
          scan_path = root / 'data' / 'ci' / 'scan_results.json'

          if not scan_path.exists():
              print('No scan_results.json found, skipping merge')
              exit(0)

          scan_data = json.loads(scan_path.read_text())
          store = load_store(store_path)
          store = merge_scan_results(store, scan_data)
          store = prune_old_jobs(store)
          for key in store.get('jobs', {}):
              store['jobs'][key] = backfill_job(store['jobs'][key])
          save_store(store_path, store)
          print(f'Merged: {len(store.get(\"jobs\", {}))} total jobs in store')
          "

      - name: Commit results
        if: ${{ env.DATABASE_URL == '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ci/
          if git diff --cached --quiet; then
            echo "No new jobs found"
          else
            COUNT=$(python -c "import json; d=json.load(open('data/ci/linkedin_jobs.json')); print(len(d.get('jobs', d)))" 2>/dev/null || echo "?")
            git commit -m "scan: LinkedIn $(date -u +%Y-%m-%dT%H:%M) — ${COUNT} jobs total"
            git pull --rebase origin main
            git push
          fi
