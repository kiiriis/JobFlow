name: Scan LinkedIn Jobs

on:
  schedule:
    # Weekdays: every 30 min during 9 AM – 9 PM EST (13:00–01:00 UTC)
    - cron: '0,30 13-23 * * 1-5'
    - cron: '0,30 0 * * 2-6'
    # Weekdays: every 60 min during 9 PM – 9 AM EST (01:00–12:00 UTC)
    - cron: '0 1-12 * * 2-6'
    # Weekends: every 4 hours
    - cron: '0 */4 * * 0,6'
  workflow_dispatch: # Allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install JobFlow
        run: pip install -e .

      - name: Run LinkedIn scan
        env:
          JOBFLOW_CONFIG: config/config.ci.yaml
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Starting scan at $(date -u)"
          jobflow scan --platform linkedin --new --save --hours 1 2>&1 || true
          echo "Scan finished at $(date -u)"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ci/
          if git diff --cached --quiet; then
            echo "No new jobs found"
          else
            COUNT=$(python -c "import json; d=json.load(open('data/ci/scan_results.json')); print(len(d))" 2>/dev/null || echo "?")
            git commit -m "scan: LinkedIn $(date -u +%Y-%m-%dT%H:%M) — ${COUNT} jobs total"
            git pull --rebase origin main
            git push
          fi
