<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}JobFlow{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icon.svg') }}">
    <script>
    (function(){
        var t = localStorage.getItem('jf-theme') ||
                (matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', t);
    })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- HTMX Progress Bar -->
    <div id="htmx-progress"></div>

    <!-- Toast Container -->
    <div id="toast-container" aria-live="polite"></div>

    <nav class="container-fluid">
        <ul>
            <li><strong>JobFlow</strong></li>
        </ul>
        <ul>
            <li><a href="/linkedin" {% if request.path == '/linkedin' %}class="active"{% endif %}>LinkedIn</a></li>
            <li><a href="/boards" {% if request.path == '/boards' %}class="active"{% endif %}>Job Boards</a></li>
        </ul>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="container">
        <small style="opacity:0.4;">JobFlow v0.1.0</small>
    </footer>

    <script>
    // ── Toast system ──────────────────────
    function showToast(message, type) {
        type = type || 'success';
        var container = document.getElementById('toast-container');
        var toast = document.createElement('div');
        toast.className = 'toast toast-' + type;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(function() {
            toast.classList.add('toast-out');
            setTimeout(function() { toast.remove(); }, 300);
        }, 2500);
    }

    // ── HTMX Progress Bar ─────────────────
    var bar = document.getElementById('htmx-progress');
    document.body.addEventListener('htmx:beforeRequest', function() {
        bar.className = 'active';
    });
    document.body.addEventListener('htmx:afterRequest', function() {
        bar.className = 'done';
        setTimeout(function() { bar.className = ''; }, 600);
    });

    // ── Clickable table rows ──────────────
    document.addEventListener('click', function(e) {
        var row = e.target.closest('tr[data-href]');
        if (row && !e.target.closest('select, button, a, input')) {
            window.location = row.dataset.href;
        }
    });

    // ── Theme toggle ──────────────────────
    function toggleTheme() {
        var html = document.documentElement;
        var current = html.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('jf-theme', next);
        var icon = document.querySelector('.theme-icon');
        if (icon) icon.textContent = next === 'dark' ? '\u2600' : '\u263E';
    }
    </script>
</body>
</html>
