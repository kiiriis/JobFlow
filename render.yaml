services:
  - type: web
    name: jobflow
    runtime: python
    buildCommand: pip install -e .
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: JOBFLOW_CONFIG
        value: config/config.ci.yaml
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard (Neon connection string)
    plan: free
    autoDeploy: true
