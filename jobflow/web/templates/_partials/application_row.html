<tr id="row-{{ job._index }}" class="just-updated" data-href="/application/{{ job._index }}">
    <td>{{ job._index }}</td>
    <td><strong>{{ job.company }}</strong></td>
    <td>
        {% if job.link %}
        <a href="{{ job.link }}" target="_blank" rel="noopener">{{ job.role }}</a>
        {% else %}
        {{ job.role }}
        {% endif %}
    </td>
    <td>
        {% set s = job.score|int %}
        <span class="score-badge {% if s >= 80 %}score-high{% elif s >= 50 %}score-mid{% else %}score-low{% endif %}">
            {{ job.score }}
        </span>
    </td>
    <td>
        <select name="status"
            hx-patch="/api/applications/{{ job._index }}/status"
            hx-target="#row-{{ job._index }}"
            hx-swap="outerHTML"
            hx-on::after-request="showToast('Status updated')"
            class="status-select">
            {% for s in statuses %}
            <option value="{{ s }}" {% if s == job.status %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>
    </td>
    <td class="col-found">{{ job.date_found }}</td>
    <td class="col-applied">{{ job.date_applied }}</td>
    <td class="col-notes">
        <span class="notes-text"
            hx-get="/api/applications/{{ job._index }}/notes/edit"
            hx-trigger="click"
            hx-swap="outerHTML"
            role="button"
            tabindex="0">
            {{ job.notes or "Add notes..." }}
        </span>
    </td>
    <td class="col-actions">
        <a href="/application/{{ job._index }}" class="btn-small btn-outline">View</a>
    </td>
</tr>
