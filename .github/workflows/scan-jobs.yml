name: Scan LinkedIn Jobs

on:
  schedule:
    # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install JobFlow
        run: pip install -e .

      - name: Run LinkedIn scan
        env:
          JOBFLOW_CONFIG: config/config.ci.yaml
        run: jobflow scan --platform linkedin --new --save 2>&1 || true

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ci/
          if git diff --cached --quiet; then
            echo "No new jobs found"
          else
            git commit -m "chore: automated LinkedIn scan $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin main
            git push
          fi
