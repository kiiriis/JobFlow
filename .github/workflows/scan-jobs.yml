name: Scan LinkedIn Jobs

on:
  schedule:
    # Every hour at :00
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install JobFlow
        run: pip install -e .

      - name: Run LinkedIn scan
        env:
          JOBFLOW_CONFIG: config/config.ci.yaml
        run: |
          echo "Starting scan at $(date -u)"
          jobflow scan --platform linkedin --new --save --hours 1 2>&1 || true
          echo "Scan finished at $(date -u)"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ci/
          if git diff --cached --quiet; then
            echo "No new jobs found"
          else
            COUNT=$(python -c "import json; d=json.load(open('data/ci/scan_results.json')); print(len(d))" 2>/dev/null || echo "?")
            git commit -m "scan: LinkedIn $(date -u +%Y-%m-%dT%H:%M) — ${COUNT} jobs total"
            git pull --rebase origin main
            git push
          fi

      - name: Keep Render alive
        run: |
          # Ping the deployed site to prevent Render free tier from sleeping
          # TODO: Replace with your actual Render URL after first deploy
          curl -sf "$RENDER_URL/linkedin" > /dev/null 2>&1 || true
        env:
          RENDER_URL: https://jobflow.onrender.com
